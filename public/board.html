<!-- public/board.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Радужная Арена – Доска</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:black; overflow:hidden; font-family:'Comic Sans MS', cursive; }
    canvas { display:block; width:100vw; height:100vh; }
    #team-select {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(255,255,255,0.9); border-radius:40px; padding:20px;
      display:flex; flex-wrap:wrap; justify-content:center; gap:30px; z-index:10;
    }
    .team-btn {
      font-size:2em; padding:25px; border-radius:50%; width:140px; height:140px;
      border:6px solid white; font-weight:bold; cursor:pointer;
      box-shadow:0 8px 16px rgba(0,0,0,0.3); transition:transform 0.1s;
      display:flex; align-items:center; justify-content:center;
      text-shadow:2px 2px 4px rgba(0,0,0,0.3);
    }
    .team-btn:active { transform:scale(0.9); }
    #scoreboard {
      position:absolute; top:10px; left:50%; transform:translateX(-50%);
      display:flex; gap:20px; background:rgba(255,255,255,0.8);
      border-radius:30px; padding:10px 25px; font-size:1.6em; font-weight:bold;
    }
    .score-item { display:flex; align-items:center; gap:8px; }
    .score-circle { width:24px; height:24px; border-radius:50%; border:2px solid #333; }
    #timer {
      position:absolute; top:10px; right:20px; background:gold; padding:10px 25px;
      border-radius:30px; font-size:2em; font-weight:bold;
    }
    #message {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      font-size:2.5em; color:gold; text-shadow:2px 2px 0 #000; display:none; text-align:center;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="team-select"></div>
<div id="scoreboard" style="display:none;"></div>
<div id="timer" style="display:none;"></div>
<div id="message"></div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const MY_BOARD_ID = parseInt(urlParams.get('board')) || 1;

  const socket = io();
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  let gameState = null;          // полное состояние от сервера
  let myBoardData = null;       // данные только нашей доски
  let teamButtonsVisible = true;
  let touchTeamMap = {};        // touch identifier -> teamId
  let mouseTeamId = null;

  const teamSelectDiv = document.getElementById('team-select');
  const scoreboardDiv = document.getElementById('scoreboard');
  const timerDiv = document.getElementById('timer');
  const messageDiv = document.getElementById('message');

  // Запрашиваем конфиг
  socket.emit('requestConfig');
  socket.on('config', (data) => {
    gameState = data;
    renderTeamButtons();
  });

  socket.on('configUpdate', (data) => {
    gameState.config = data.config;
    gameState.teams = data.teams;
    if (!gameState.config.isRunning) renderTeamButtons();
    updateScoreboard();
  });

  socket.on('gameState', (state) => {
    gameState.boards = state.boards;
    gameState.scores = state.scores;
    gameState.timeLeft = state.timeLeft;
    gameState.isRunning = state.isRunning;
    // Берём данные своей доски
    myBoardData = state.boards.find(b => b.id === MY_BOARD_ID);
    draw();
    updateScoreboard();
    updateTimer();
  });

  socket.on('scoreUpdate', (scores) => {
    gameState.scores = scores;
    updateScoreboard();
  });

  socket.on('hit', (data) => {
    if (data.boardId === MY_BOARD_ID) playSound('hit');
  });
  socket.on('crystal', (data) => {
    if (data.boardId === MY_BOARD_ID) playSound('crystal');
  });
  socket.on('miss', (data) => {
    if (data.boardId === MY_BOARD_ID) playSound('miss');
  });

  socket.on('gameStarted', () => {
    teamSelectDiv.style.display = 'none';
    scoreboardDiv.style.display = 'flex';
    timerDiv.style.display = 'block';
    teamButtonsVisible = false;
    showMessage('Стреляй по мишеням!', 2000);
  });
  socket.on('gameStopped', () => {
    showMessage('Игра окончена! Все молодцы! 🌟', 4000);
    teamSelectDiv.style.display = 'flex';
    scoreboardDiv.style.display = 'none';
    timerDiv.style.display = 'none';
    teamButtonsVisible = true;
  });
  socket.on('roundEnd', () => {
    showMessage('Время вышло! Все молодцы! 🌟', 4000);
    teamSelectDiv.style.display = 'flex';
    scoreboardDiv.style.display = 'none';
    timerDiv.style.display = 'none';
    teamButtonsVisible = true;
  });

  // --- Отрисовка ---
  function draw() {
    if (!myBoardData) return;
    canvas.width = myBoardData.width;
    canvas.height = myBoardData.height;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const theme = gameState.config.theme || 'farm';
    ctx.fillStyle = theme === 'space' ? '#1a1a4e' : '#e0f7fa';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Разделение доски
    if (myBoardData.split && myBoardData.subBoards) {
      myBoardData.subBoards.forEach(sb => {
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 6;
        ctx.strokeRect(sb.x, sb.y, sb.width, sb.height);
      });
    }

    // Боты
    myBoardData.bots.forEach(bot => {
      ctx.fillStyle = theme === 'space' ? '#00ffcc' : '#FFB347';
      ctx.beginPath();
      ctx.arc(bot.x, bot.y, 28, 0, 2*Math.PI);
      ctx.fill();
      ctx.strokeStyle = 'black';
      ctx.lineWidth = 3;
      ctx.stroke();
      // Глаза и рот
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(bot.x-9, bot.y-9, 5, 0, Math.PI, true); ctx.fill();
      ctx.beginPath(); ctx.arc(bot.x+9, bot.y-9, 5, 0, Math.PI, true); ctx.fill();
      ctx.fillStyle = 'black';
      ctx.beginPath(); ctx.arc(bot.x-9, bot.y-11, 2, 0, 2*Math.PI); ctx.fill();
      ctx.beginPath(); ctx.arc(bot.x+9, bot.y-11, 2, 0, 2*Math.PI); ctx.fill();
      ctx.strokeStyle = 'black';
      ctx.beginPath(); ctx.arc(bot.x, bot.y+5, 7, 0, Math.PI); ctx.stroke();
    });

    // Кристаллы
    myBoardData.crystals.forEach(c => {
      ctx.fillStyle = '#FF00FF';
      ctx.beginPath();
      const s = 14;
      ctx.moveTo(c.x, c.y - s);
      ctx.lineTo(c.x + s, c.y);
      ctx.lineTo(c.x, c.y + s);
      ctx.lineTo(c.x - s, c.y);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();
    });
  }

  // --- Кнопки команд (только для нашей доски) ---
  function renderTeamButtons() {
    if (!gameState) return;
    const mode = gameState.config.mode;
    let availableTeams = [];

    if (mode === 'single_multi') {
      // Только одна команда на board=1
      if (MY_BOARD_ID === 1) availableTeams = [gameState.teams[0]]; // Котята
    } else if (mode === 'duel') {
      if (MY_BOARD_ID === 1) availableTeams = [gameState.teams[0]];
      else if (MY_BOARD_ID === 2) availableTeams = [gameState.teams[1]];
    } else if (mode === 'quad_split') {
      const board = gameState.boards.find(b => b.id === MY_BOARD_ID);
      if (board && board.subBoards) {
        const teamIds = board.subBoards.map(s => s.teamId);
        availableTeams = gameState.teams.filter(t => teamIds.includes(t.id));
      }
    }

    teamSelectDiv.innerHTML = availableTeams.map(team =>
            `<button class="team-btn" style="background:${team.color};" data-team-id="${team.id}">${team.name}</button>`
    ).join('');

    document.querySelectorAll('.team-btn').forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        for (const touch of e.changedTouches) {
          touchTeamMap[touch.identifier] = parseInt(btn.dataset.teamId);
        }
      });
      btn.addEventListener('mousedown', (e) => {
        mouseTeamId = parseInt(btn.dataset.teamId);
      });
    });
  }

  // --- Стрельба ---
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!gameState || !gameState.isRunning) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    for (const touch of e.changedTouches) {
      const teamId = touchTeamMap[touch.identifier];
      if (!teamId) { showMessage('Нажми на свою команду!', 1000); continue; }
      const x = (touch.clientX - rect.left) * scaleX;
      const y = (touch.clientY - rect.top) * scaleY;
      socket.emit('shoot', { x, y, teamId, boardId: MY_BOARD_ID });
    }
  });

  canvas.addEventListener('mousedown', (e) => {
    if (!gameState || !gameState.isRunning) return;
    if (!mouseTeamId) { showMessage('Выбери команду (кликни кнопку)!', 1000); return; }
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    socket.emit('shoot', { x, y, teamId: mouseTeamId, boardId: MY_BOARD_ID });
  });

  // --- Вспомогательные функции ---
  function updateScoreboard() {
    if (!gameState || !gameState.teams) return;
    const teams = gameState.teams.filter(t => {
      // показываем все команды, участвующие в игре (чтобы видеть общий счёт)
      if (gameState.config.mode === 'single_multi') return t.id === 1;
      if (gameState.config.mode === 'duel') return t.id <= 2;
      return true; // quad_split – все 4
    });
    scoreboardDiv.innerHTML = teams.map(t => {
      const score = gameState.scores ? (gameState.scores.find(s => s.id === t.id)?.score || 0) : 0;
      return `<div class="score-item"><span class="score-circle" style="background:${t.color};"></span> ${t.name}: ${score}</div>`;
    }).join('');
  }

  function updateTimer() {
    if (!gameState || !gameState.isRunning) {
      timerDiv.textContent = '0:00';
      return;
    }
    const sec = Math.ceil(gameState.timeLeft / 1000);
    const m = Math.floor(sec/60);
    const s = sec % 60;
    timerDiv.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }

  function showMessage(text, duration) {
    messageDiv.textContent = text;
    messageDiv.style.display = 'block';
    setTimeout(() => { messageDiv.style.display = 'none'; }, duration);
  }

  function playSound(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      if (type === 'hit') { osc.type='triangle'; osc.frequency.value=500; }
      else if (type === 'crystal') { osc.type='sine'; osc.frequency.value=800; }
      else { osc.type='square'; osc.frequency.value=200; }
      osc.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.1);
    } catch(e) {}
  }

  // Анимация
  function loop() {
    draw();
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
