<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Доска 1</title>
  <link rel="stylesheet" href="board1.css">
</head>
<body>
<div id="authOverlay">
  <div class="auth-container">
    <h2>🔐 Доступ к доске 1</h2>
    <input type="password" id="boardPassword" placeholder="Введите пароль" autocomplete="off">
    <button id="authSubmitBtn">Войти</button>
    <div id="authError" class="error-msg"></div>
  </div>
</div>

<div class="boards-container" id="gameContainer" style="display:none;">
  <div class="game-area" id="gameArea1">
    <div class="team-info left">
      <div class="team-name" id="teamNameDisplay1">Команда 1</div>
      <div class="score" id="scoreDisplay1">Очки: 0</div>
    </div>
    <div class="message" id="messageOverlay1">Ожидание запуска...</div>
  </div>
  <div class="game-area" id="gameArea2" style="display:none;">
    <div class="team-info right">
      <div class="team-name" id="teamNameDisplay2">Команда 2</div>
      <div class="score" id="scoreDisplay2">Очки: 0</div>
    </div>
    <div class="message" id="messageOverlay2">Ожидание запуска...</div>
  </div>
</div>
<div class="timer" id="timerDisplay">00:00</div>

<script src="board1.js"></script>
</body>
</html>
